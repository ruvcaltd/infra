version: '3.9'

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard (internal use)
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme.json:/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
    ports:
      - "9092:9092"
    networks:
      - app-network

    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--save", "900 1", "--save", "300 10", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
      - NODE_ENV=production
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*      
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app-network"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app-network"
      - "traefik.http.routers.portainer.rule=Host(`portainer.ruvca-investments.com`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  init-docuseal-cert:
    image: alpine
    container_name: init-docuseal-cert
    restart: "no"
    volumes:
      - docuseal_certs:/certs
    command: >
      sh -c "
        if [ ! -f /certs/cert.p12 ]; then
          apk add --no-cache openssl &&
          openssl req -x509 -newkey rsa:4096 -keyout /tmp/key.pem -out /tmp/cert.pem -days 3650 -nodes -subj '/CN=documenso' &&
          openssl pkcs12 -export -out /certs/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -passout pass: &&
          rm /tmp/key.pem /tmp/cert.pem &&
          echo 'Certificate generated.'
        else
          echo 'Certificate already exists, skipping.'
        fi
      "

  docuseal:
    image: documenso/documenso:latest
    container_name: docuseal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      init-docuseal-cert:
        condition: service_completed_successfully
    environment:
      - NEXT_PRIVATE_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_URLENCODED}@postgres:5432/docuseal
      - NEXT_PRIVATE_DIRECT_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_URLENCODED}@postgres:5432/docuseal
      - NEXT_PRIVATE_ENCRYPTION_KEY=${DOCUMENSO_ENCRYPTION_KEY}
      - NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY=${DOCUMENSO_ENCRYPTION_SECONDARY_KEY}
      - NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH=/certs/cert.p12
      - NEXT_PRIVATE_SIGNING_PASSPHRASE=
      - NEXT_PRIVATE_SIGNING_TRANSPORT=local
      - NEXT_PRIVATE_SMTP_HOST=${DOCUMENSO_SMTP_HOST}
      - NEXT_PRIVATE_SMTP_PORT=${DOCUMENSO_SMTP_PORT}
      - NEXT_PRIVATE_SMTP_USERNAME=${DOCUMENSO_SMTP_USERNAME}
      - NEXT_PRIVATE_SMTP_PASSWORD=${DOCUMENSO_SMTP_PASSWORD}
      - NEXT_PRIVATE_SMTP_FROM_NAME=${DOCUMENSO_SMTP_FROM_NAME}
      - NEXT_PRIVATE_SMTP_FROM_ADDRESS=${DOCUMENSO_SMTP_FROM_ADDRESS}
      - NEXTAUTH_SECRET=${OPENROUTER_API_KEY}
      - NEXTAUTH_URL=https://sign.ruvca-investments.com
      - NEXT_PUBLIC_WEBAPP_URL=https://sign.ruvca-investments.com
      - NEXT_PUBLIC_MARKETING_URL=https://sign.ruvca-investments.com
    volumes:
      - docuseal_data:/opt/documenso/data
      - docuseal_certs:/certs:ro
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app-network"
      - "traefik.http.routers.docuseal.rule=Host(`sign.ruvca-investments.com`)"
      - "traefik.http.routers.docuseal.entrypoints=websecure"
      - "traefik.http.routers.docuseal.tls=true"
      - "traefik.http.routers.docuseal.tls.certresolver=letsencrypt"
      - "traefik.http.services.docuseal.loadbalancer.server.port=3000"

networks:
  app-network:
    driver: bridge
    name: app-network
    external: true


volumes:
  mssql_data:
  postgres_data:
  zookeeper_data:
  kafka_data:
  redis_data:
  n8n_data:
  portainer_data:
  docuseal_data:
  docuseal_certs:
